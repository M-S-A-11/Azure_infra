trigger:
- main

pool:
  vmImage: 'ubuntu-latest'
  name: 'GitHub-hosted Agents' 

variables:
  workingDir: 'environment/20260706/dev'

steps:
- checkout: self

- task: AzureCLI@2
  displayName: 'Terraform basic flow'
  inputs:
    azureSubscription: 'ADO_Practice'   # <-- replace with the actual service connection name
    scriptType: 'bash'
    scriptLocation: 'inlineScript'
    inlineScript: |
      set -e
      cd "$(workingDir)"
      terraform init
      terraform validate
      terraform fmt -check
      terraform plan -out=tfplan
      terraform apply -auto-approve tfplan
